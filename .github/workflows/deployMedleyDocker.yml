name: 'Deploy Online-Medley Docker Image'

on:
  workflow_dispatch:
      draft:
        description: "Deploy to Development"
        type: boolean
        default: false

  workflow_call:
    secrets:
      OIO_SSH_KEY:
        required: true
    inputs:
      draft:
        description: "Deploy to Development"
        type: boolean
        default: false
        required: false
      platform:
          description: "linux/amd64 or linux/arm64"
          type: string
          default: 'linux/amd64'
          required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # SSH into online.interlisp.org and call the deployment scripts
      - name: call-deploy-scripts-on-oio
        shell: bash
        run: |
          eval $(ssh-agent)
          ssh-add - <<< "${SSH_KEY}"
          if [ "${{ inputs.draft }}" = true ]
          then
            pull=pulldev
          else
            pull=pullprod
          fi
          ssh -o StrictHostKeyChecking=no ubuntu@online.interlisp.org /home/ubuntu/bin/oio medley ${pull}
        env:
          SSH_KEY: ${{ secrets.OIO_SSH_KEY }}

